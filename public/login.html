<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - 人员在线管理系统</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="shared.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
        }
        .login-card h1 { text-align: center; color: #1a202c; font-size: 1.5em; margin-bottom: 8px; }
        .login-card .subtitle { text-align: center; color: #718096; font-size: 0.9em; margin-bottom: 30px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #2d3748; font-size: 0.9em; }
        .form-group select, .form-group input {
            width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 8px;
            font-size: 1em; transition: border-color 0.2s; background: white;
        }
        .form-group select:focus, .form-group input:focus { outline: none; border-color: #667eea; }
        .login-btn {
            width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 8px; font-size: 1em; font-weight: 600;
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102,126,234,0.4); }
        .login-btn:active { transform: translateY(0); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
        .error-msg {
            background: #fed7d7; color: #c53030; padding: 10px 14px; border-radius: 8px;
            margin-bottom: 16px; font-size: 0.9em; display: none;
        }
        .error-msg.show { display: block; }
        .success-msg {
            background: #c6f6d5; color: #276749; padding: 10px 14px; border-radius: 8px;
            margin-bottom: 16px; font-size: 0.9em; display: none;
        }
        .success-msg.show { display: block; }
        .tab-switch {
            display: flex; margin-bottom: 24px; border-bottom: 2px solid #e2e8f0;
        }
        .tab-switch button {
            flex: 1; padding: 12px; background: none; border: none; font-size: 1em;
            font-weight: 600; color: #718096; cursor: pointer; transition: all 0.2s;
        }
        .tab-switch button.active {
            color: #667eea; border-bottom: 2px solid #667eea; margin-bottom: -2px;
        }
    </style>
</head>
<body>
<div id="app">
    <div class="login-card">
        <h1>人员在线管理系统</h1>
        <p class="subtitle" v-if="activeTab === 'login'">请选择角色并登录</p>
        <p class="subtitle" v-else>创建新账号</p>

        <div class="tab-switch">
            <button :class="{ active: activeTab === 'login' }" @click="switchTab('login')">登录</button>
            <button :class="{ active: activeTab === 'register' }" @click="switchTab('register')">注册</button>
        </div>

        <div class="error-msg" :class="{ show: errorMsg }">{{ errorMsg }}</div>
        <div class="success-msg" :class="{ show: successMsg }">{{ successMsg }}</div>

        <!-- 登录表单 -->
        <form v-if="activeTab === 'login'" @submit.prevent="handleLogin">
            <div class="form-group">
                <label>角色</label>
                <select v-model.number="loginForm.role">
                    <option :value="0">队长</option>
                    <option :value="1">连干</option>
                    <option :value="2">排干</option>
                    <option :value="3">班长</option>
                    <option :value="4">卫生员</option>
                    <option :value="5">班员</option>
                </select>
            </div>
            <div class="form-group">
                <label>排号</label>
                <input type="number" v-model.number="loginForm.platoon" min="1" max="10" placeholder="请输入排号">
            </div>
            <div class="form-group">
                <label>班号</label>
                <input type="number" v-model.number="loginForm.squad" min="1" max="10" placeholder="请输入班号">
            </div>
            <button type="submit" class="login-btn" :disabled="loading">
                {{ loading ? '登录中...' : '登录' }}
            </button>
        </form>

        <!-- 注册表单 -->
        <form v-else @submit.prevent="handleRegister">
            <div class="form-group">
                <label>姓名</label>
                <input type="text" v-model="registerForm.name" placeholder="请输入姓名" required>
            </div>
            <div class="form-group">
                <label>角色</label>
                <select v-model.number="registerForm.role">
                    <option :value="0">队长</option>
                    <option :value="1">连干</option>
                    <option :value="2">排干</option>
                    <option :value="3">班长</option>
                    <option :value="4">卫生员</option>
                    <option :value="5">班员</option>
                </select>
            </div>
            <div class="form-group">
                <label>排号</label>
                <input type="number" v-model.number="registerForm.platoon" min="1" max="10" placeholder="请输入排号" required>
            </div>
            <div class="form-group">
                <label>班号</label>
                <input type="number" v-model.number="registerForm.squad" min="1" max="10" placeholder="请输入班号" required>
            </div>
            <button type="submit" class="login-btn" :disabled="loading">
                {{ loading ? '注册中...' : '注册' }}
            </button>
        </form>
    </div>
</div>

<script>
const { createApp } = Vue;

createApp({
    data() {
        return {
            activeTab: 'login',
            loginForm: { role: 3, platoon: 1, squad: 1 },
            registerForm: { name: '', role: 5, platoon: 1, squad: 1 },
            loading: false,
            errorMsg: '',
            successMsg: ''
        };
    },
    mounted() {
        if (isLoggedIn()) {
            const user = getCurrentUser();
            this.redirectByRole(user.role, user.platoon, user.squad);
        }
    },
    methods: {
        switchTab(tab) {
            this.activeTab = tab;
            this.errorMsg = '';
            this.successMsg = '';
        },
        async handleLogin() {
            this.loading = true;
            this.errorMsg = '';
            this.successMsg = '';
            try {
                const data = await login(this.loginForm.role, this.loginForm.platoon, this.loginForm.squad);
                this.redirectByRole(data.role, data.platoon, data.squad);
            } catch (e) {
                this.errorMsg = e.message || '登录失败';
                this.loading = false;
            }
        },
        async handleRegister() {
            this.loading = true;
            this.errorMsg = '';
            this.successMsg = '';
            try {
                const data = await register(
                    this.registerForm.name,
                    this.registerForm.role,
                    this.registerForm.platoon,
                    this.registerForm.squad
                );
                this.successMsg = '注册成功，正在跳转...';
                setTimeout(() => {
                    this.redirectByRole(data.role, data.platoon, data.squad);
                }, 1000);
            } catch (e) {
                this.errorMsg = e.message || '注册失败';
                this.loading = false;
            }
        },
        redirectByRole(role, platoon, squad) {
            if (role === 0 || role === 1) {
                window.location.href = 'index.html';
            } else if (role === 2) {
                window.location.href = 'platoon.html?p=' + platoon;
            } else {
                window.location.href = 'squad.html?p=' + platoon + '&s=' + squad;
            }
        }
    }
}).mount('#app');
</script>
</body>
</html>
