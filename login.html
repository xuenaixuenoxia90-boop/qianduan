<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录</title>
    <script src="api.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #1e3a5f, #2d5a8e); height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif; }
        .login-card { background: white; border-radius: 20px; padding: 40px 30px; max-width: 380px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .login-card h1 { text-align: center; color: #1f2937; font-size: 1.5em; margin-bottom: 8px; }
        .login-card .subtitle { text-align: center; color: #6b7280; font-size: 0.9em; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: #374151; font-size: 0.95em; }
        .form-group input { width: 100%; padding: 14px 16px; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 1em; transition: border-color 0.2s; }
        .form-group input:focus { outline: none; border-color: #3b82f6; }
        .login-btn { width: 100%; padding: 14px; background: #3b82f6; color: white; border: none; border-radius: 12px; font-size: 1.1em; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .login-btn:hover { background: #2563eb; }
        .login-btn:active { transform: scale(0.98); }
        .login-btn:disabled { background: #9ca3af; cursor: not-allowed; }
        .error-msg { color: #ef4444; font-size: 0.85em; margin-top: 8px; display: none; text-align: center; }
    </style>
</head>
<body>
<div class="login-card">
    <h1>人员情况系统</h1>
    <p class="subtitle">请选择角色并登录</p>
    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label for="role">角色</label>
            <select id="role" name="role" required>
                <option value="0">队长</option>
                <option value="1">连干</option>
                <option value="2">排干</option>
                <option value="3" selected>班长</option>
                <option value="4">卫生员</option>
                <option value="5">班员</option>
            </select>
        </div>
        <div class="form-group">
            <label for="platoon">排号</label>
            <input type="number" id="platoon" name="platoon" min="1" max="10" value="1" placeholder="请输入排号" required>
        </div>
        <div class="form-group">
            <label for="squad">班号</label>
            <input type="number" id="squad" name="squad" min="1" max="10" value="1" placeholder="请输入班号" required>
        </div>
        <div class="error-msg" id="errorMsg"></div>
        <button type="submit" class="login-btn" id="loginBtn">登录</button>
    </form>
</div>

<script>
// 如果已登录，直接跳转
if (isLoggedIn()) {
    var user = getCurrentUser();
    var role = user.role;
    if (role === 0 || role === 1) {
        window.location.href = 'index.html';
    } else if (role === 2) {
        window.location.href = 'platoon.html?p=' + user.platoon;
    } else {
        window.location.href = 'squad.html?p=' + user.platoon + '&s=' + user.squad;
    }
}

async function handleLogin(e) {
    e.preventDefault();
    var role = parseInt(document.getElementById('role').value);
    var platoon = parseInt(document.getElementById('platoon').value);
    var squad = parseInt(document.getElementById('squad').value);
    var btn = document.getElementById('loginBtn');
    var errorMsg = document.getElementById('errorMsg');

    btn.disabled = true;
    btn.textContent = '登录中...';
    errorMsg.style.display = 'none';

    try {
        var data = await login(role, platoon, squad);
        var userRole = data.role;

        // 根据角色跳转
        if (userRole === 0 || userRole === 1) {
            // 队长/连干：去连级页面
            window.location.href = 'index.html';
        } else if (userRole === 2) {
            // 排干：去排级页面
            window.location.href = 'platoon.html?p=' + data.platoon;
        } else {
            // 班长/卫生员/班员：去班级页面
            window.location.href = 'squad.html?p=' + data.platoon + '&s=' + data.squad;
        }
    } catch (err) {
        errorMsg.textContent = err.message || '登录失败';
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '登录';
    }
}
</script>
</body>
</html>
